<div x-data="storyList" class="panel" xmlns:x-bind="http://www.w3.org/1999/xhtml">
    <div class="panel-block">
        <button class="button is-medium is-fullwidth is-primary">
            <span class="icon" x-html="window.Icons.plus"></span><span>Create a new Mapstory</span>
        </button>
    </div>
    <div class="panel-block">
        <p class="control has-icons-left">
            <input class="input" type="text" placeholder="Search"/>
            <span class="icon is-left"><i class="fas fa-search" aria-hidden="true"></i></span>
        </p>
    </div>

    <template x-for="story in stories" x-key="story.id">
        <div class="panel-block is-active is-justify-content-space-between is-align-items-center">
            <!-- Left-aligned Title and Subtitle -->
            <div class="content" style="flex: 1;">
                <p class="title is-5 m-0" x-text="story.title"/>
                <p class="subtitle is-7 m-0 has-text-grey" x-text="story.description"/>
            </div>

            <!-- Right-aligned Buttons Group -->
            <div class="buttons are-small" style="display: flex; gap: 0.5rem;">

                <a x-bind:href="`#/stories/${story.id}/details`" class="button is-rounded" data-navigo
                   style="width: 2.5rem; height: 2.5rem; display: flex; align-items: center; justify-content: center; padding: 0;">
                    <span class="icon" x-html="window.Icons.edit"></span>
                </a>

                <!-- Add Button -->
                <button class="button is-rounded" style="width: 2.5rem; height: 2.5rem; display: flex; align-items: center; justify-content: center; padding: 0;">
                    <span class="icon" x-html="window.Icons.delete"></span>
                </button>
            </div>
        </div>

    </template>
</div>
